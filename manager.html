<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Copilot - Manager Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        html { font-size: 16px; } 
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; font-size: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .kpi-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; background: #ffffff; }
        .kpi-card:hover { border-color: #10b981; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="bg-emerald-900 text-white shadow-2xl sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center">
                    <div class="bg-emerald-500 p-2 rounded-xl mr-4 shadow-lg shadow-emerald-500/20">
                        <i class="fa-solid fa-chart-pie text-2xl text-white"></i>
                    </div>
                    <span class="font-black text-2xl tracking-tighter uppercase">HR <span class="text-emerald-400 font-light">Copilot</span></span>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="text-right hidden md:block border-r border-emerald-700 pr-6">
                        <p id="userNameDisplay" class="text-sm font-bold opacity-90 tracking-wide">Manager</p>
                        <p class="text-[10px] opacity-50 uppercase font-black tracking-widest">Authorized Access</p>
                    </div>
                    <button onclick="logout()" class="w-12 h-12 bg-white/10 rounded-2xl hover:bg-red-500 transition-all flex items-center justify-center text-xl shadow-inner">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="bg-white rounded-3xl shadow-sm p-8 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Team</p><p class="text-4xl font-black text-slate-800" id="countTotal">0</p></div>
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 text-2xl"><i class="fa-solid fa-user-group"></i></div>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm p-8 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Awaiting</p><p class="text-4xl font-black text-amber-500" id="countPending">0</p></div>
                    <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 text-2xl"><i class="fa-solid fa-hourglass-half"></i></div>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm p-8 border border-slate-200">
                <div class="flex items-center justify-between">
                    <div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Evaluated</p><p class="text-4xl font-black text-emerald-500" id="countEvaluated">0</p></div>
                    <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 text-2xl"><i class="fa-solid fa-check-double"></i></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="px-10 py-7 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h2 class="font-black text-slate-700 uppercase tracking-widest text-sm flex items-center"><i class="fa-solid fa-users-viewfinder mr-3 text-emerald-600 text-lg"></i> Team Performance Overview</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-[0.2em] border-b bg-white">
                            <th class="px-10 py-6 font-black">Employee ID</th>
                            <th class="px-6 py-6 font-black">Name / Identity</th>
                            <th class="px-6 py-6 font-black">Unit / Division</th>
                            <th class="px-6 py-6 text-center font-black">Status</th>
                            <th class="px-10 py-6 text-center font-black">Action</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody" class="text-base divide-y divide-slate-100">
                        <tr><td colspan="5" class="p-20 text-center text-slate-400 font-bold uppercase tracking-widest text-xs">Initializing Database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form KPIs -->
    <div id="evalModal" class="fixed inset-0 bg-slate-950/70 hidden z-50 flex justify-center items-start pt-4 pb-4 overflow-y-auto no-scrollbar backdrop-blur-md">
        <div class="bg-white rounded-[3rem] shadow-2xl w-11/12 max-w-7xl flex flex-col max-h-full border border-white/20">
            <div class="px-12 py-8 border-b border-slate-100 bg-white flex justify-between items-center rounded-t-[3rem] sticky top-0 z-10">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase leading-none mb-2">Performance Evaluation</h2>
                    <div class="flex items-center">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full mr-3 animate-pulse"></span>
                        <p class="text-lg text-emerald-600 font-black uppercase tracking-wider" id="modalEmpName"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-14 h-14 flex items-center justify-center rounded-2xl hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all group">
                    <i class="fa-solid fa-xmark text-3xl group-hover:rotate-90 transition-transform duration-300"></i>
                </button>
            </div>
            
            <div class="p-12 overflow-y-auto no-scrollbar flex-grow bg-slate-50/30" id="kpiContainer"></div>

            <div class="px-12 py-10 border-t border-slate-100 bg-white flex justify-between items-center rounded-b-[3rem]">
                <div class="bg-slate-50 px-10 py-6 rounded-3xl border border-slate-100 shadow-inner">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">KPIs Result Summary</p>
                    <p class="text-6xl font-black text-emerald-600 leading-none tabular-nums tracking-tighter"><span id="autoTotalScore">0.00</span> <span class="text-2xl font-bold text-slate-300">/ 100</span></p>
                </div>
                <div class="flex space-x-5">
                    <button onclick="closeModal()" class="px-10 py-5 rounded-2xl font-black text-slate-400 hover:text-slate-600 text-lg transition-all">Cancel</button>
                    <button onclick="submitEvaluation()" id="submitBtn" class="px-16 py-5 bg-slate-900 text-white rounded-[1.5rem] hover:bg-emerald-600 shadow-2xl shadow-slate-200 font-black text-xl transition-all flex items-center">
                        <i class="fa-solid fa-cloud-arrow-up mr-4"></i> Submit Results
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/api.js"></script>
    <script>
        let currentUser = null, employees = [], currentEmpId = null, currentKPIs = [];

        window.onload = async () => {
            currentUser = checkAuth("Manager"); 
            if(currentUser) {
                document.getElementById('userNameDisplay').innerText = currentUser.email;
                const res = await apiCall("get_manager_data", { userId: currentUser.userId });
                if(res.status === "success") { employees = res.data; renderDashboard(); }
            }
        };

        function renderDashboard() {
            document.getElementById('countTotal').innerText = employees.length;
            document.getElementById('countPending').innerText = employees.filter(e => e.status === 'Pending').length;
            document.getElementById('countEvaluated').innerText = employees.filter(e => e.status === 'Evaluated').length;

            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = '';
            
            employees.forEach(emp => {
                const isEval = emp.status === 'Evaluated';
                const badge = isEval 
                    ? `<span class="bg-emerald-100 text-emerald-700 px-5 py-2 rounded-2xl text-[10px] font-black uppercase border border-emerald-200/50">Completed</span>`
                    : `<span class="bg-amber-50 text-amber-600 px-5 py-2 rounded-2xl text-[10px] font-black uppercase border border-amber-200/50 tracking-widest">Pending Review</span>`;
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="px-10 py-8 font-mono text-slate-400 text-sm font-bold">#${emp.id}</td>
                        <td class="px-6 py-8"><p class="text-xl font-black text-slate-800 leading-none mb-2">${emp.name}</p><p class="text-sm text-slate-400 font-bold tracking-tight">Identity: ${emp.nickname}</p></td>
                        <td class="px-6 py-8 text-sm text-slate-500 font-bold leading-relaxed uppercase tracking-tighter">${emp.department}<br><span class="opacity-40 text-xs font-black tracking-widest">${emp.position}</span></td>
                        <td class="px-6 py-8 text-center">${badge}</td>
                        <td class="px-10 py-8 text-center">
                            <button onclick="openModal('${emp.id}')" class="px-8 py-3 rounded-2xl text-sm font-black transition-all ${isEval?'text-slate-400 hover:bg-slate-100 border-2 border-slate-100':'bg-emerald-500 text-white hover:bg-emerald-600 shadow-xl shadow-emerald-100'}">
                                ${isEval?'Update Details':'Review Score'}
                            </button>
                        </td>
                    </tr>`;
            });
        }

        function openModal(empId) {
            const emp = employees.find(e => e.id === empId);
            currentEmpId = empId;
            document.getElementById('modalEmpName').innerText = `Record: ${emp.id} — ${emp.name}`;
            currentKPIs = JSON.parse(JSON.stringify(emp.kpis)); 
            if(emp.savedKPIs) {
                currentKPIs.forEach(k => {
                    const saved = emp.savedKPIs.find(s => s.id === k.id);
                    if(saved) {
                        k.actual = saved.actual;
                        k.details = saved.details || '';
                        k.evidenceName = saved.evidenceName || '';
                        k.evidenceData = saved.evidenceData || '';
                    }
                });
            }
            renderKPIs();
            document.getElementById('evalModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('evalModal').classList.add('hidden'); }

        function extractNum(str) {
            if(!str || str === '-') return NaN;
            let match = String(str).replace(/,/g, '').match(/-?\d+(\.\d+)?/);
            return match ? parseFloat(match[0]) : NaN;
        }

        async function handleFileChange(index, file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentKPIs[index].evidenceData = e.target.result; 
                currentKPIs[index].evidenceName = file.name;
                renderKPIs();
            };
            reader.readAsDataURL(file);
        }

        function handleActualChange(index, value) {
            currentKPIs[index].actual = value;
            const actualVal = parseFloat(value), kpi = currentKPIs[index], alertEl = document.getElementById(`alert_detect_${index}`);
            const s1 = extractNum(kpi.scale[1]), s5 = extractNum(kpi.scale[5]);
            
            if(!isNaN(actualVal) && !isNaN(s1) && !isNaN(s5)) {
                const isAsc = s5 > s1;
                const isOut = isAsc ? (actualVal < s1 || actualVal > s5) : (actualVal > s1 || actualVal < s5);
                alertEl.innerHTML = isOut ? `<span class="text-[10px] text-red-500 font-black blink tracking-widest uppercase"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Out of Scale</span>` : '';
            } else { alertEl.innerHTML = ''; }
            calculateTotalScore();
        }

        function calculateTotalScore() {
            let totalWeightedScore = 0, totalWeight = 0;
            currentKPIs.forEach((kpi, index) => {
                const weight = parseFloat(kpi.weight) || 0;
                totalWeight += weight;
                let kpiScore5 = 0, val = extractNum(kpi.actual);

                if (!isNaN(val)) {
                    const s = [extractNum(kpi.scale[1]), extractNum(kpi.scale[2]), extractNum(kpi.scale[3]), extractNum(kpi.scale[4]), extractNum(kpi.scale[5])];
                    if (!s.some(isNaN)) {
                        const isAsc = s[4] > s[0];
                        if (isAsc) {
                            if (val < s[0]) kpiScore5 = 0;
                            else if (val >= s[4]) kpiScore5 = 5;
                            else { for(let i=0; i<4; i++) { if(val >= s[i] && val <= s[i+1]) { kpiScore5 = (i+1) + ((val - s[i]) / (s[i+1] - s[i])); break; } } }
                        } else {
                            if (val > s[0]) kpiScore5 = 0;
                            else if (val <= s[4]) kpiScore5 = 5;
                            else { for(let i=0; i<4; i++) { if(val <= s[i] && val >= s[i+1]) { kpiScore5 = (i+1) + ((s[i] - val) / (s[i] - s[i+1])); break; } } }
                        }
                    }
                }
                const weighted = (kpiScore5 / 5) * weight;
                totalWeightedScore += weighted;
                const weightEl = document.getElementById(`weight_display_${index}`);
                if(weightEl) weightEl.value = `${weighted.toFixed(2)}`;
            });
            document.getElementById('autoTotalScore').innerText = (totalWeight > 0 ? (totalWeightedScore / totalWeight) * 100 : 0).toFixed(2);
        }

        function getCopyOptions(kpiName) {
            let options = '<option value="">คัดลอกผลงานล่าสุดจากทีม...</option>';
            let count = 0;
            employees.forEach(e => {
                if(e.id !== currentEmpId && e.savedKPIs) {
                    const match = e.kpis.find(k => k.name === kpiName);
                    if(match) {
                        const saved = e.savedKPIs.find(s => s.id === match.id);
                        if(saved && saved.actual) {
                            options += `<option value="${saved.actual}">คุณ${e.nickname} (${saved.actual})</option>`;
                            count++;
                        }
                    }
                }
            });
            return count > 0 ? options : '';
        }

        function copyActual(index, val) {
            if(val) {
                currentKPIs[index].actual = val;
                renderKPIs();
            }
        }

        function renderKPIs() {
            const container = document.getElementById('kpiContainer');
            container.innerHTML = '';
            currentKPIs.forEach((kpi, index) => {
                const isCorp = kpi.type === 'Corp';
                const copyOptions = getCopyOptions(kpi.name);
                
                container.innerHTML += `
                    <div class="kpi-card rounded-[2.5rem] p-10 mb-14 relative overflow-hidden">
                        <div class="flex flex-col lg:flex-row lg:items-start justify-between mb-8 gap-6 border-b border-slate-50 pb-8">
                            <div class="flex-grow">
                                <div class="flex items-center mb-5 flex-wrap gap-4">
                                    <span class="bg-slate-900 text-white text-[10px] px-3 py-1.5 rounded-lg mr-4 font-black uppercase tracking-widest shadow-lg shadow-slate-200">${kpi.type}</span>
                                    <h3 class="font-black text-slate-800 text-3xl tracking-tighter uppercase leading-none">KPI: ${kpi.name}</h3>
                                </div>
                                ${copyOptions && !isCorp ? `
                                    <div class="mb-4">
                                        <select onchange="copyActual(${index}, this.value)" class="text-[11px] font-black text-emerald-600 bg-emerald-50 rounded-xl px-4 py-2 border-2 border-emerald-100 outline-none cursor-pointer hover:bg-emerald-100 transition-colors">
                                            ${copyOptions}
                                        </select>
                                    </div>
                                ` : ''}
                                <div class="p-6 bg-emerald-50/50 rounded-[1.5rem] border border-emerald-100 text-base leading-relaxed text-emerald-900 font-bold italic shadow-inner">
                                    <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest block mb-2 not-italic">Description & Scoring Rule</span>
                                    ${kpi.remark || 'No additional measurement detail provided'}
                                </div>
                            </div>
                            <div class="lg:text-right min-w-[150px] bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Weight</p> 
                                <p class="text-5xl font-black text-slate-300 leading-none tracking-tighter tabular-nums">${kpi.weight}<span class="text-xl">%</span></p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-12 text-center">
                            <div class="bg-white border-2 border-slate-50 rounded-2xl p-5"><p class="text-[10px] font-black text-slate-300 uppercase mb-3 tracking-widest">เป้าขั้นต่ำ (1)</p><p class="text-sm font-black text-red-400 tracking-tight">${kpi.scale[1]}</p></div>
                            <div class="bg-white border-2 border-slate-50 rounded-2xl p-5"><p class="text-[10px] font-black text-slate-300 uppercase mb-3 tracking-widest">ต่ำกว่ามาตรฐาน (2)</p><p class="text-sm font-black text-amber-500 tracking-tight">${kpi.scale[2]}</p></div>
                            <div class="bg-emerald-50/80 border-2 border-emerald-500/30 rounded-2xl p-5 ring-8 ring-emerald-500/5 shadow-sm"><p class="text-[10px] font-black text-emerald-600 uppercase mb-3 tracking-widest">เป้ามาตรฐาน (3)</p><p class="text-lg font-black text-emerald-700 tracking-tight">${kpi.scale[3]}</p></div>
                            <div class="bg-white border-2 border-slate-50 rounded-2xl p-5"><p class="text-[10px] font-black text-slate-300 uppercase mb-3 tracking-widest">สูงกว่ามาตรฐาน (4)</p><p class="text-sm font-black text-teal-500 tracking-tight">${kpi.scale[4]}</p></div>
                            <div class="bg-white border-2 border-slate-50 rounded-2xl p-5"><p class="text-[10px] font-black text-slate-300 uppercase mb-3 tracking-widest">เป้าท้าทาย (5)</p><p class="text-sm font-black text-emerald-500 tracking-tight">${kpi.scale[5]}</p></div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-stretch">
                            <div class="lg:col-span-4 space-y-10 flex flex-col justify-between">
                                <div>
                                    <label class="block text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Actual Performance</label>
                                    <div class="relative group">
                                        <input type="number" step="any" value="${kpi.actual}" oninput="handleActualChange(${index}, this.value)" class="w-full p-8 border-2 border-slate-100 rounded-[2rem] font-black text-emerald-600 bg-slate-50/50 focus:bg-white focus:border-emerald-500 transition-all text-5xl placeholder-slate-200 shadow-inner group-hover:border-slate-200" placeholder="0.00" ${isCorp?'disabled':''}>
                                        <div id="alert_detect_${index}" class="absolute -bottom-8 left-0 h-8"></div>
                                    </div>
                                </div>
                                
                                <div class="bg-slate-50 border-2 border-slate-100 border-dashed rounded-[2rem] p-8 transition-all hover:border-emerald-200 hover:bg-white">
                                    <label class="block text-xs font-black text-slate-400 mb-5 uppercase tracking-[0.2em]">Evidence Attachment</label>
                                    <div class="flex flex-col gap-5">
                                        <input type="file" id="file_${index}" onchange="handleFileChange(${index}, this.files[0])" class="hidden">
                                        <label for="file_${index}" class="cursor-pointer bg-white border-2 border-slate-100 text-slate-600 px-8 py-4 rounded-[1.5rem] text-sm font-black text-center shadow-sm hover:shadow-md hover:border-emerald-500 transition-all active:scale-95 uppercase tracking-widest flex items-center justify-center">
                                            <i class="fa-solid fa-paperclip mr-3 text-emerald-500 text-lg"></i> Choose Evidence
                                        </label>
                                        ${kpi.evidenceName ? `
                                            <div class="flex items-center gap-4 bg-emerald-600 text-white p-5 rounded-[1.5rem] shadow-xl shadow-emerald-100">
                                                <i class="fa-solid fa-file-circle-check text-2xl"></i>
                                                <span class="text-xs font-black truncate flex-grow">${kpi.evidenceName}</span>
                                                <button onclick="currentKPIs[${index}].evidenceName=''; currentKPIs[${index}].evidenceData=''; renderKPIs();" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        ` : '<p class="text-xs text-slate-300 font-bold text-center uppercase tracking-widest opacity-50">JPG, PDF, XLS, DOC are accepted</p>'}
                                    </div>
                                </div>
                            </div>
                            
                            <div class="lg:col-span-5 flex flex-col">
                                <label class="block text-xs font-black text-slate-400 mb-4 uppercase tracking-[0.2em]">Achievement Notes (Details)</label>
                                <textarea onchange="currentKPIs[${index}].details = this.value" class="flex-grow w-full p-10 border-2 border-slate-100 rounded-[2.5rem] text-lg bg-slate-50/50 focus:bg-white focus:border-emerald-500 outline-none font-bold text-slate-700 transition-all shadow-inner leading-relaxed" placeholder="Briefly describe the key achievements...">${kpi.details || ''}</textarea>
                            </div>

                            <div class="lg:col-span-3 flex flex-col justify-center">
                                <div class="bg-slate-900 rounded-[3rem] p-10 shadow-2xl shadow-slate-300 text-center relative overflow-hidden group">
                                    <label class="block text-[10px] font-black text-emerald-400 mb-8 uppercase tracking-[0.4em] opacity-80">Score Contribution</label>
                                    <div class="relative inline-block mb-4">
                                        <input type="text" id="weight_display_${index}" disabled value="0.00" class="w-full bg-transparent font-black text-white text-7xl text-center tabular-nums leading-none mb-3 tracking-tighter">
                                        <div class="h-1.5 w-16 bg-emerald-500 mx-auto rounded-full shadow-lg shadow-emerald-500/50"></div>
                                    </div>
                                    <p class="mt-8 text-[11px] font-black text-slate-500 uppercase tracking-widest">Weight Factor: ${kpi.weight}%</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            calculateTotalScore();
        }

        async function submitEvaluation() {
            const isIncomplete = currentKPIs.some(k => k.type !== 'Corp' && !k.actual);
            if(isIncomplete) return alert("โปรดกรอกผลงานจริงให้ครบทุกข้อก่อนการยืนยันข้อมูล");

            const score = document.getElementById('autoTotalScore').innerText;
            const btn = document.getElementById('submitBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-4"></i> Synchronizing...`;
            btn.disabled = true;
            
            const payload = { empId: currentEmpId, kpis: currentKPIs, totalScore: score, initGrade: '-' };
            const res = await apiCall("save_manager_eval", payload);
            
            if(res.status === "success") {
                const emp = employees.find(e => e.id === currentEmpId);
                emp.status = 'Evaluated'; emp.savedKPIs = currentKPIs; emp.savedScore = score;
                closeModal(); renderDashboard(); alert("ระบบทำการบันทึกข้อมูลเรียบร้อยแล้ว");
            } else { alert("เกิดข้อผิดพลาด: " + res.message); }
            btn.innerHTML = originalHTML; btn.disabled = false;
        }
        function logout() { localStorage.removeItem("hr_user_session"); window.location.href = "index.html"; }
    </script>
</body>
</html>
